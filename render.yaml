services:
  - type: web
    name: convo-commerce
    runtime: python
    # Seed is idempotent; migrations 001/003 must be run once in the Supabase SQL editor.
    buildCommand: pip install -r requirements.txt && python scripts/seed_data.py
    # Single worker so ADK's in-memory sessions stay consistent across turns.
    # For >1 worker/instance, switch the runner to DatabaseSessionService first.
    startCommand: python -m uvicorn src.gateway.app:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      # --- Agent engine (Google ADK multi-agent) ---
      - key: AGENT_ENGINE
        value: adk
      - key: ADK_MODEL
        value: gemini-2.0-flash
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: "false"
      - key: GOOGLE_API_KEY            # AI Studio key (starts with 'AIza...')
        sync: false

      # --- Store ---
      - key: STORE_NAME
        value: SYSCO Convo-Commerce
      - key: STORE_CURRENCY
        value: USD
      - key: PAYMENT_LINK_BASE
        sync: false
      - key: OPS_API_KEY
        sync: false

      # --- Supabase ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SCHEMA
        value: commerce

      # --- WhatsApp via Twilio (30-day trial) ---
      - key: WHATSAPP_PROVIDER
        value: twilio
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886

      # --- Telegram ---
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false

      # --- Instagram / Messenger (Meta Graph API) ---
      - key: INSTAGRAM_PAGE_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_VERIFY_TOKEN
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: MESSENGER_PAGE_ACCESS_TOKEN
        sync: false
      - key: MESSENGER_VERIFY_TOKEN
        sync: false
      - key: MESSENGER_APP_SECRET
        sync: false
      - key: GRAPH_API_VERSION
        value: v21.0
